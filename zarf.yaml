---
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfInitConfig
metadata:
  name: slim
  # renovate: datasource=docker depName=ghcr.io/zarf-dev/zarf/agent
  version: v0.82.0
  source: https://github.com/colonel-byte/zarf-slim-init
  annotations:
    org.opencontainers.image.source: "https://github.com/colonel-byte/zarf-slim-init"
variables:
  - name: AGENT_TOLERATIONS
    default: |-
      - operator: "Exists"
    autoIndent: true
  - name: PROXY_TOLERATIONS
    default: |-
      - operator: "Exists"
    autoIndent: true
  - name: NODE_INFRASTRUCTURE_LABEL
    default: adrp.xyz/is-infra
    description: |-
      kubernets label that is used to indicate nodes that are used for infrastructure purposes
components:
  # Pulls in the zarf-injector
  - name: zarf-injector
    required: false
    only:
      cluster:
        architecture: amd64
    import:
      # renovate: datasource=docker
      url: oci://ghcr.io/zarf-dev/packages/init:v0.82.0

  # Pulls in the zarf-injector
  - name: zarf-injector
    required: false
    only:
      cluster:
        architecture: arm64
    import:
      path: injector

  # This package moves the injector & registries binaries
  - name: zarf-seed-registry
    required: false
    import:
      # renovate: datasource=docker
      url: oci://ghcr.io/zarf-dev/packages/init:v0.82.0
    charts:
      - name: docker-registry
        valuesFiles:
          - values/registry-core.yaml
          - values/registry-seed.yaml

  # Creates the permanent registry
  - name: zarf-registry
    required: false
    only:
      flavor: upstream
    import:
      # renovate: datasource=docker
      url: oci://ghcr.io/zarf-dev/packages/init:v0.82.0
    charts:
      - name: docker-registry
        valuesFiles:
          - values/registry-core.yaml

  # Creates the permanent registry
  - name: zarf-registry
    required: false
    only:
      flavor: rook
    import:
      name: zarf-registry
      # renovate: datasource=docker
      url: oci://ghcr.io/zarf-dev/packages/init:v0.82.0
    charts:
      - name: docker-registry
        valuesFiles:
          - values/registry-core.yaml
          - values/registry-rook.yaml
          - values/registry-high.yaml

  # Creates the pod+git mutating webhook
  - name: zarf-agent
    required: false
    import:
      # renovate: datasource=docker
      url: oci://ghcr.io/zarf-dev/packages/init:v0.82.0

  # Adds a git server to the cluster
  - name: git-server
    required: false
    import:
      # renovate: datasource=docker
      url: oci://ghcr.io/zarf-dev/packages/init:v0.82.0
    charts:
      - name: gitea
        # renovate: datasource=docker depName=docker.io/giteacharts/gitea
        version: 12.7.0
