---
imagePullSecrets:
  - name: private-registry

secrets:
  htpasswd: "###ZARF_HTPASSWD###"
  configData:
    http:
      secret: "###ZARF_REGISTRY_SECRET###"

service:
  nodePort: "###ZARF_NODEPORT###"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 3
    memory: 2Gi

fullnameOverride: "zarf-docker-registry"

podLabels:
  zarf.dev/agent: "ignore"

affinity:
  enabled: true
  custom:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###"
                operator: In
                values:
                  - "true"

tolerations:
  - operator: Exists

autoscaling:
  enabled: false
  mapReplicasToNodes: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

caBundle: |
  ###ZARF_VAR_REGISTRY_CA_BUNDLE###

extraEnvVars: []

serviceAccount:
  create: true
  name: docker-registry
  annotations: []
